<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub</title>
  <!-- Tailwind CSS for modern utility styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for fine minimalist typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', 'sans-serif'],
            serif: ['"Instrument Serif"', 'serif'],
          },
          colors: {
            paper: {
              DEFAULT: '#FAF8F5', // Soft warm alabaster
              text: '#2D2924',    // Muted charcoal-bronze
              muted: '#8A8379',   // Warm gray
              border: '#E6E0D5'   // Very light warm-gray border
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #FAF8F5;
      color: #2D2924;
    }
    input::placeholder {
      color: #A39C93 !important;
    }
  </style>
</head>
<body class="min-h-screen pt-12 pb-24 px-8 md:px-16 font-sans antialiased relative selection:bg-paper-border">

  <!-- Minimalist Add Link Toggle (Plain text in top-right corner) -->
  <button onclick="toggleForm()" class="absolute top-8 right-8 md:right-16 text-xs tracking-wider text-paper-muted hover:text-paper-text transition-colors duration-200">
    + ADD SHORTCUT
  </button>

  <div class="max-w-6xl mx-auto">
    
    <!-- Ultra-minimal Search (Clean bottom line only) -->
    <div class="mb-16 max-w-sm">
      <input type="text" id="search" oninput="filterShortcuts()" placeholder="Search..." class="w-full bg-transparent text-paper-text pb-1 border-b border-paper-border focus:border-paper-text focus:outline-none transition-colors duration-300 text-sm tracking-wide font-light" />
    </div>

    <!-- Minimal Form Drawer (Integrated, borderless layout) -->
    <div id="addFormContainer" class="hidden mb-16 max-w-xl transition-all duration-300">
      <form id="addLinkForm" onsubmit="addShortcut(event)" class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">
          <div>
            <label class="block text-[10px] uppercase tracking-widest text-paper-muted mb-1">Title *</label>
            <input type="text" id="title" required placeholder="GitHub" class="w-full bg-transparent pb-1 text-sm border-b border-paper-border focus:outline-none focus:border-paper-text transition-colors">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest text-paper-muted mb-1">URL *</label>
            <input type="url" id="url" required placeholder="https://..." class="w-full bg-transparent pb-1 text-sm border-b border-paper-border focus:outline-none focus:border-paper-text transition-colors">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest text-paper-muted mb-1">Category</label>
            <input type="text" id="category" placeholder="Work" class="w-full bg-transparent pb-1 text-sm border-b border-paper-border focus:outline-none focus:border-paper-text transition-colors">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest text-paper-muted mb-1">Description</label>
            <input type="text" id="description" placeholder="Optional description" class="w-full bg-transparent pb-1 text-sm border-b border-paper-border focus:outline-none focus:border-paper-text transition-colors">
          </div>
        </div>
        <div class="flex items-center gap-4 pt-2">
          <button type="submit" class="text-xs tracking-wider text-paper-text hover:opacity-75 transition-opacity font-medium">SAVE</button>
          <span class="text-paper-border text-xs">/</span>
          <button type="button" onclick="toggleForm()" class="text-xs tracking-wider text-paper-muted hover:text-paper-text transition-colors">CANCEL</button>
        </div>
      </form>
    </div>

    <!-- Quiet Loading Status -->
    <div id="loading" class="py-4">
      <div class="text-xs tracking-widest text-paper-muted font-light">INDEXING...</div>
    </div>

    <!-- Empty State -->
    <div id="empty" class="hidden py-8">
      <p class="text-xs tracking-wide text-paper-muted font-light">No shortcuts found.</p>
    </div>

    <!-- Harmonious Category Matrix -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-12 gap-y-12"></div>

  </div>

  <script>
    // Configured directly with your new deployment URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyO2qzFd-XdmCdEwn_aOaPLciswtoE27cm4e2hST6uA6XMPrbdlZWhrNfNZ87RxM4k8Sg/exec";
    
    let allLinks = [];

    // Focus search on "/" keypress
    window.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== document.getElementById('search') && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });

    function toggleForm() {
      const container = document.getElementById('addFormContainer');
      container.classList.toggle('hidden');
    }

    // Helper to safely pull domain names from URLs to fetch favicons
    function getDomain(url) {
      try {
        return new URL(url).hostname;
      } catch (e) {
        return '';
      }
    }

    // Fetch Links using a cache-busting timestamp parameter (?_t=...)
    async function loadLinks() {
      const loadingEl = document.getElementById('loading');
      const gridEl = document.getElementById('grid');
      
      try {
        const response = await fetch(`${API_URL}?_t=${Date.now()}`);
        allLinks = await response.json();
        renderLinks(allLinks);
      } catch (err) {
        console.error("Error fetching data:", err);
        gridEl.innerHTML = `<div class="text-xs text-red-800">Connection error. Check script configuration.</div>`;
      } finally {
        loadingEl.classList.add('hidden');
      }
    }

    // Render categorized lists with minimalist icons
    function renderLinks(links) {
      const gridEl = document.getElementById('grid');
      const emptyEl = document.getElementById('empty');
      gridEl.innerHTML = '';

      if (links.length === 0) {
        emptyEl.classList.remove('hidden');
        return;
      } else {
        emptyEl.classList.add('hidden');
      }

      // Group keys smoothly
      const categories = {};
      links.forEach(item => {
        const cat = item.category || 'General';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(item);
      });

      // Render clean typographic sections
      for (const [category, items] of Object.entries(categories)) {
        const section = document.createElement('div');
        section.className = 'flex flex-col space-y-4';
        
        let headerHtml = `
          <h2 class="text-xs font-medium tracking-widest text-paper-muted uppercase border-b border-paper-border pb-1.5">
            ${category}
          </h2>
          <div class="space-y-3 flex flex-col">
        `;

        let linksHtml = items.map(item => {
          const domain = getDomain(item.url);
          const faviconUrl = domain ? `https://www.google.com/s2/favicons?sz=32&domain=${domain}` : '';

          return `
            <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="group block text-left">
              <div class="flex items-center gap-2">
                ${faviconUrl ? `
                  <img src="${faviconUrl}" 
                       class="w-3.5 h-3.5 rounded-sm object-contain opacity-80 group-hover:opacity-100 transition-opacity duration-150" 
                       alt="" 
                       onerror="this.style.display='none'">
                ` : ''}
                <span class="text-[13px] font-medium text-paper-text group-hover:text-paper-muted transition-colors duration-150 decoration-paper-border underline-offset-4">
                  ${item.title}
                </span>
              </div>
              ${item.description ? `<span class="text-[11px] block text-paper-muted font-light leading-snug mt-1 pl-5">${item.description}</span>` : ''}
            </a>
          `;
        }).join('');

        section.innerHTML = headerHtml + linksHtml + '</div>';
        gridEl.appendChild(section);
      }
    }

    function filterShortcuts() {
      const query = document.getElementById('search').value.toLowerCase();
      const filtered = allLinks.filter(item => 
        item.title.toLowerCase().includes(query) || 
        (item.description && item.description.toLowerCase().includes(query)) ||
        (item.category && item.category.toLowerCase().includes(query))
      );
      renderLinks(filtered);
    }

    // Dynamic, Optimistic Background Upload Sync
    async function addShortcut(event) {
      event.preventDefault();

      const title = document.getElementById('title').value;
      const url = document.getElementById('url').value;
      const category = document.getElementById('category').value || 'General';
      const description = document.getElementById('description').value;

      const newShortcut = { title, url, category, description };

      // OPTIMISTIC UPDATE: Project instantly to UI
      allLinks.push(newShortcut);
      renderLinks(allLinks);

      // Clean inputs immediately
      document.getElementById('addLinkForm').reset();
      toggleForm();

      try {
        // Post write to sheet in background
        await fetch(API_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(newShortcut)
        });

        // Background fetch 1.5 seconds later with cache-busting to perfectly align states
        setTimeout(async () => {
          const syncResponse = await fetch(`${API_URL}?_t=${Date.now()}`);
          allLinks = await syncResponse.json();
          renderLinks(allLinks);
        }, 1500);

      } catch (err) {
        console.error("Database alignment failed:", err);
      }
    }

    // Load initial collection
    loadLinks();
  </script>
</body>
</html>
